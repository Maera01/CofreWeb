<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cofre Digital — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#111118; --panel:#16161f; --border:#1e1e2e;
    --accent:#4f8ef7; --accent2:#7c3aed; --danger:#ef4444;
    --text:#e2e8f0; --muted:#64748b;
    --mono:'DM Mono',monospace; --sans:'Syne',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--sans); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  /* grid bg */
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }
  .glow{
    position:fixed; width:500px; height:500px; border-radius:50%;
    background: radial-gradient(circle, rgba(79,142,247,.08) 0%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .box{
    position:relative; z-index:1;
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:40px; width:420px; max-width:95vw;
  }
  .logo{ text-align:center; margin-bottom:32px; }
  .logo .icon{ font-size:36px; }
  .logo h1{ font-size:22px; font-weight:800; margin-top:10px; letter-spacing:-0.4px; }
  .logo p{ font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:4px; }
  .form-group{ margin-bottom:14px; }
  .form-label{
    display:block; font-size:10px; font-family:var(--mono);
    color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.8px;
  }
  .form-input{
    width:100%; padding:10px 14px; border-radius:9px;
    background:var(--panel); border:1px solid var(--border);
    color:var(--text); font-family:var(--sans); font-size:13px; outline:none;
    transition:border-color .15s;
  }
  .form-input:focus{ border-color:var(--accent); }
  .form-input::placeholder{ color:var(--muted); }
  .divider{
    display:flex; align-items:center; gap:10px;
    margin:18px 0; color:var(--muted); font-size:11px; font-family:var(--mono);
  }
  .divider::before,.divider::after{
    content:''; flex:1; height:1px; background:var(--border);
  }
  .btn-login{
    width:100%; padding:12px; border-radius:9px;
    background:var(--accent); border:none; color:#fff;
    font-family:var(--sans); font-size:14px; font-weight:700;
    cursor:pointer; transition:all .15s; margin-top:6px;
    letter-spacing:.2px;
  }
  .btn-login:hover{ background:#6b9ef8; transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,142,247,.3); }
  .btn-login:active{ transform:translateY(0); }
  .error{
    background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25);
    border-radius:8px; padding:10px 14px; font-size:12px; color:#f87171;
    margin-bottom:16px; font-family:var(--mono);
  }
  .hint{ font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:14px; text-align:center; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="box">
  <div class="logo">
    <div class="icon">🔐</div>
    <h1>Cofre Digital</h1>
    <p>ACESSO SEGURO EMPRESARIAL</p>
  </div>

  {% if erro %}
  <div class="error">⚠ {{ erro }}</div>
  {% endif %}

  <form method="POST" action="/">
    <div class="form-group">
      <label class="form-label">Usuário</label>
      <input class="form-input" type="text" name="usuario" placeholder="seu.usuario" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" name="senha" placeholder="••••••••" required>
    </div>
    <div class="divider">senha master</div>
    <div class="form-group">
      <label class="form-label">Senha Master do Cofre</label>
      <input class="form-input" type="password" name="senha_master" placeholder="••••••••" required>
    </div>
    <button class="btn-login" type="submit">Entrar no Cofre →</button>
  </form>

  <p class="hint">Aplicativo em desenvolvimento @@</p>
</div>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/wake-sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
